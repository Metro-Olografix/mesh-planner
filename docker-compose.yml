services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: meshplanner
      POSTGRES_USER: meshplanner
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meshplanner"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        VITE_ZITADEL_AUTHORITY: ${VITE_ZITADEL_AUTHORITY}
        VITE_ZITADEL_CLIENT_ID: ${VITE_ZITADEL_CLIENT_ID}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - splat_tiles:/app/.splat_tiles
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_TARGET: http://backend:8000
      VITE_ZITADEL_AUTHORITY: ${VITE_ZITADEL_AUTHORITY}
      VITE_ZITADEL_CLIENT_ID: ${VITE_ZITADEL_CLIENT_ID}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    ports:
      - "5173:5173"

volumes:
  pgdata:
  splat_tiles:
