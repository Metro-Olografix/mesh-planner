services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: meshplanner
      POSTGRES_USER: meshplanner
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meshplanner"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm dev --host"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_TARGET: http://backend:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - splat_tiles:/app/.splat_tiles
      - ./custom:/app/custom:ro
      - ./backend/app:/app/app
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/alembic:/app/alembic
    ports:
      - "8000:8000"

volumes:
  pgdata:
  splat_tiles:
