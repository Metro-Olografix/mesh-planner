# Requires an ingress controller (e.g. ingress-nginx) and cert-manager for TLS.
# Adjust the host and TLS secret name to match your cluster.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mesh-planner
  namespace: mesh-planner
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Required for SSE — disable buffering
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - mesh.example.com
      secretName: mesh-planner-tls
  rules:
    - host: mesh.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
