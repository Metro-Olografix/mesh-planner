{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mesh-planner.name" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mesh-planner.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: frontend
    spec:
      {{- include "mesh-planner.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: frontend
          image: {{ include "mesh-planner.image" .Values.frontend.image }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.service.port }}
          env:
            - name: VITE_API_TARGET
              value: "http://{{ include "mesh-planner.name" . }}-backend:{{ .Values.backend.service.port }}"
            - name: VITE_OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "mesh-planner.name" . }}-secrets
                  key: OIDC_CLIENT_ID
          {{- if .Values.frontend.resources }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mesh-planner.name" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mesh-planner.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: frontend
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: {{ .Values.frontend.service.port }}
{{- end }}
