apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mesh-planner.name" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mesh-planner.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ required "postgresql.auth.password is required" .Values.postgresql.auth.password | quote }}
  ZITADEL_CLIENT_ID: {{ required "zitadel.clientId is required" .Values.zitadel.clientId | quote }}
