apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mesh-planner.name" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mesh-planner.labels" . | nindent 4 }}
data:
  POSTGRES_DB: {{ .Values.postgresql.auth.database | quote }}
  POSTGRES_USER: {{ .Values.postgresql.auth.username | quote }}
  ZITADEL_DOMAIN: {{ .Values.zitadel.domain | quote }}
  VITE_ZITADEL_AUTHORITY: {{ .Values.zitadel.domain | quote }}
  LOG_LEVEL: {{ .Values.logLevel | quote }}
