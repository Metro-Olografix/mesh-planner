server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'sha256-mDycTsoyHiqyFLCeRgwCGEl/wqaiCqVJl/3tWuV4M+s=' 'sha256-fuiDmREkTc3MIBzG1Q9F0N+0PJEMGEuE2hsiT9kQTRE='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://tile.openstreetmap.org https://*.tile.openstreetmap.org; connect-src 'self' https://tile.openstreetmap.org https://*.tile.openstreetmap.org https://sso.olografix.org; font-src 'self' data:; worker-src blob: 'self'; frame-ancestors 'self'" always;

    # SPA fallback — all non-asset routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite content-hashes filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-declare security headers (nginx replaces inherited add_header in nested blocks)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'sha256-mDycTsoyHiqyFLCeRgwCGEl/wqaiCqVJl/3tWuV4M+s=' 'sha256-fuiDmREkTc3MIBzG1Q9F0N+0PJEMGEuE2hsiT9kQTRE='; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://tile.openstreetmap.org https://*.tile.openstreetmap.org; connect-src 'self' https://tile.openstreetmap.org https://*.tile.openstreetmap.org https://sso.olografix.org; font-src 'self' data:; worker-src blob: 'self'; frame-ancestors 'self'" always;
    }
}
