[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
# Matches ruff's built-in defaults: pycodestyle errors, pyflakes.
# Keeping this explicit so IDE and CI always evaluate the same rules
# regardless of ruff version.
select = ["E4", "E7", "E9", "F"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
